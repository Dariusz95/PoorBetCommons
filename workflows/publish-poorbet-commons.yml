name: Publish poorbet-commons

on:
  push:
    branches:
      - main
    paths:
      - "**"
      - ".github/workflows/publish-poorbet-commons.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: github
          server-username: ${{ env.GITHUB_ACTOR }}
          server-password: ${{ env.GITHUB_TOKEN }}

      - name: Publish poorbet-commons to GitHub Packages
        working-directory: poorbet-commons
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn --batch-mode deploy
